name: Verify tokens

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build tokens
        run: npm run build:tokens

      - name: Verify tokens
        run: node scripts/tokens-verify.mjs

      - name: Comment on PR if divergences
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('docs/api/tokens-sync.json', 'utf8'));
            const body = [
              '### ⚠️ tokens-verify detectou divergências',
              '',
              `- Tokens analisados: **${report.totals.jsonTokens}**`,
              `- Erros: **${report.totals.errors}**`,
              `- Avisos: **${report.totals.warnings}**`,
              '',
              'Ver detalhes em `docs/tokens-sync.html` (após merge) ou no log da action.',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Note — snapshot Figma ausente
        run: |
          if [ ! -f .figma-snapshot.json ]; then
            echo "::notice::Snapshot Figma não encontrado. Verificação JSON ↔ Figma pulada. Gerar via Claude Code (ver docs/process-figma-sync.md)."
          fi
