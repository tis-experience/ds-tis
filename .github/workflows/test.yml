name: Test

on:
  pull_request:
    paths:
      - "tokens/**"
      - "css/**"
      - "docs/**"
      - "scripts/**"
      - "tests/visual/**"
      - "tests/consumer/**"
      - "build-tokens.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "css/**"
      - "docs/**"
      - "scripts/**"
      - "tests/visual/**"
      - "tests/consumer/**"
      - "build-tokens.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build tokens (necessário pro test-css-references comparar)
        run: npm run build:tokens

      - name: Gerar documentação e API pública
        run: npm run sync:docs && npm run build:api

      - name: API commitada sem drift (docs/api regenerado deve bater com o commit)
        run: git diff --exit-code docs/api/components.json docs/api/adrs.json docs/api/foundations.json

      - name: Token integrity (aliases, descriptions, modes)
        run: node scripts/test-token-integrity.mjs

      - name: CSS reference resolution (var() + @import)
        run: node scripts/test-css-references.mjs

      - name: Generator output (sync-docs, tokens-verify, build-llms)
        run: node scripts/test-generators.mjs

      - name: Interactive modules (Modal, Menu, Combobox)
        run: node scripts/test-interactive.mjs

      - name: Runtime e readiness dos componentes
        run: node scripts/test-api-runtime.mjs && npm run test:readiness

      - name: Form Field anatomy in docs
        run: node scripts/test-field-docs.mjs

      - name: Self-test (provoca regressões e valida que detectores pegam)
        run: node scripts/test-self.mjs

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: A11y (axe-core WCAG 2.2 AA contra .a11y-baseline.json)
        run: node scripts/test-a11y.mjs

      - name: Consumer smoke (npm pack → install → Playwright + axe)
        run: npm run test:consumer-smoke

      - name: Visual regression (Playwright + pixelmatch)
        run: node scripts/test-visual.mjs

      - name: Upload visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          path: |
            tests/visual/actual/
            tests/visual/diff/
          if-no-files-found: ignore
