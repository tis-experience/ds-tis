name: Test

on:
  pull_request:
    paths:
      - "tokens/**"
      - "css/**"
      - "docs/**"
      - "scripts/**"
      - "tests/visual/**"
      - "tests/consumer/**"
      - "tests/runtime/**"
      - "js/**"
      - "build-tokens.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "css/**"
      - "docs/**"
      - "scripts/**"
      - "tests/visual/**"
      - "tests/consumer/**"
      - "tests/runtime/**"
      - "js/**"
      - "build-tokens.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build tokens (necessário pro test-css-references comparar)
        run: npm run build:tokens

      - name: Gerar documentação e API pública
        run: npm run sync:docs && npm run build:api && npm run build:llms

      - name: Contrato público commitado sem drift
        run: >-
          git diff --exit-code --
          docs/api/components.json docs/api/tokens.json docs/api/adrs.json docs/api/foundations.json
          docs/component-inventory.md docs/adr-index.md docs/changelog.html
          docs/agent-consumer-usage.html docs/decisions/ docs/llms.txt docs/llms-full.txt

      - name: Token integrity (aliases, descriptions, modes)
        run: node scripts/test-token-integrity.mjs

      - name: CSS reference resolution (var() + @import)
        run: node scripts/test-css-references.mjs

      - name: Generator output (sync-docs, tokens-verify, build-llms)
        run: node scripts/test-generators.mjs

      - name: Interactive modules (Modal, Menu, Combobox)
        run: node scripts/test-interactive.mjs

      - name: Runtime e readiness dos componentes
        run: node scripts/test-api-runtime.mjs && npm run test:readiness

      - name: Form Field anatomy in docs
        run: node scripts/test-field-docs.mjs

      - name: Self-test (provoca regressões e valida que detectores pegam)
        run: node scripts/test-self.mjs

      - name: Cenários de auditoria (pacote, agents e contratos globais)
        run: npm run test:audit-scenarios:ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Gate App-ready (evidência executada, tarball, axe e visual)
        run: npm run test:app-ready

      - name: Upload visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          path: |
            tests/visual/actual/
            tests/visual/diff/
          if-no-files-found: ignore
