<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS TIS — runtime lifecycle</title>
  <link rel="stylesheet" href="/css/design-system.css">
</head>
<body>
  <main id="mount">
    <button type="button" class="ds-button ds-button--outline ds-button--sm" data-ds-modal-open="life-modal" id="open-modal">
      <span class="ds-button__label">Abrir modal</span>
    </button>

    <div class="ds-action-menu" id="life-menu">
      <button type="button" class="ds-button ds-button--ghost ds-button--sm ds-action-menu__trigger" id="menu-trigger" aria-haspopup="menu" aria-expanded="false" aria-controls="life-menu-list">
        <span class="ds-button__label">Ações</span>
      </button>
      <div class="ds-menu ds-action-menu__content" id="life-menu-list" role="menu">
        <button type="button" class="ds-menu__item" role="menuitem">
          <span class="ds-menu__item-label">Editar</span>
        </button>
        <button type="button" class="ds-menu__item" role="menuitem">
          <span class="ds-menu__item-label">Excluir</span>
        </button>
      </div>
    </div>

    <div class="ds-combobox-anchor" id="life-combo">
      <div class="ds-combobox ds-combobox--md">
        <input
          class="ds-combobox__input"
          id="combo-input"
          type="text"
          role="combobox"
          aria-expanded="false"
          aria-controls="combo-list"
          aria-autocomplete="list"
          placeholder="Filtrar"
        >
      </div>
      <ul class="ds-combobox__listbox" id="combo-list" role="listbox" hidden>
        <li class="ds-combobox__option" role="option">Alpha</li>
        <li class="ds-combobox__option" role="option">Beta</li>
      </ul>
    </div>

    <div class="ds-accordion" id="life-accordion" data-accordion-mode="single">
      <div class="ds-accordion__item" data-state="closed">
        <button class="ds-accordion__trigger" type="button" id="acc-trigger-a" aria-expanded="false" aria-controls="acc-panel-a">
          <span class="ds-accordion__title">Seção A</span>
        </button>
        <div class="ds-accordion__panel" id="acc-panel-a" role="region" aria-labelledby="acc-trigger-a" hidden>
          <p style="margin:0">Painel A</p>
        </div>
      </div>
      <div class="ds-accordion__item" data-state="closed">
        <button class="ds-accordion__trigger" type="button" id="acc-trigger-b" aria-expanded="false" aria-controls="acc-panel-b">
          <span class="ds-accordion__title">Seção B</span>
        </button>
        <div class="ds-accordion__panel" id="acc-panel-b" role="region" aria-labelledby="acc-trigger-b" hidden>
          <p style="margin:0">Painel B</p>
        </div>
      </div>
      <div class="ds-accordion__item ds-accordion__item--disabled" data-state="closed" aria-disabled="true">
        <button class="ds-accordion__trigger" type="button" id="acc-trigger-disabled" aria-expanded="false" aria-controls="acc-panel-disabled" aria-disabled="true">
          <span class="ds-accordion__title">Seção indisponível</span>
        </button>
        <div class="ds-accordion__panel" id="acc-panel-disabled" role="region" aria-labelledby="acc-trigger-disabled" hidden>
          <p style="margin:0">Painel indisponível</p>
        </div>
      </div>
    </div>

    <div class="ds-tabs" id="life-tabs" role="tablist" aria-label="Lifecycle tabs">
      <button class="ds-tab ds-tab--active" role="tab" id="life-tab-a" aria-selected="true" aria-controls="life-panel-a">A</button>
      <button class="ds-tab" role="tab" id="life-tab-b" aria-selected="false" aria-controls="life-panel-b" tabindex="-1">B</button>
    </div>
    <div class="ds-tab-panel" id="life-panel-a" role="tabpanel" aria-labelledby="life-tab-a">
      <p style="margin:0">Painel tab A</p>
    </div>
    <div class="ds-tab-panel" id="life-panel-b" role="tabpanel" aria-labelledby="life-tab-b" hidden>
      <p style="margin:0">Painel tab B</p>
    </div>

    <div class="ds-tooltip ds-tooltip--top" id="life-tooltip">
      <button type="button" class="ds-button ds-button--outline ds-button--sm" id="tip-trigger" aria-describedby="life-tip">Tip</button>
      <span class="ds-tooltip__content" id="life-tip" role="tooltip">Texto do tooltip</span>
    </div>
  </main>

  <div class="ds-modal-overlay" id="life-modal" hidden>
    <div class="ds-modal ds-modal--sm" role="dialog" aria-modal="true" aria-labelledby="life-modal-title">
      <div class="ds-modal__header">
        <h3 id="life-modal-title" class="ds-modal__title">Lifecycle</h3>
        <button class="ds-modal__close" type="button" aria-label="Fechar modal">×</button>
      </div>
      <div class="ds-modal__body"><p style="margin:0">Corpo</p></div>
    </div>
  </div>

  <script type="module" src="/tests/runtime/lifecycle-app.js"></script>
</body>
</html>
